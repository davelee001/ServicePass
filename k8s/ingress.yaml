# ServicePass Ingress Configuration
# Requires an Ingress Controller (e.g., nginx-ingress, traefik)
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: servicepass-ingress
  namespace: servicepass
  annotations:
    # Nginx Ingress Controller annotations
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    
    # CORS configuration
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://app.servicepass.com"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    
    # Timeouts
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    
    # Body size
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    
    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: SAMEORIGIN";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "Referrer-Policy: no-referrer-when-downgrade";

spec:
  tls:
  - hosts:
    - app.servicepass.com
    - api.servicepass.com
    secretName: servicepass-tls
  rules:
  # Frontend Application
  - host: app.servicepass.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: servicepass-frontend-service
            port:
              number: 80
  
  # Backend API
  - host: api.servicepass.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: servicepass-backend-service
            port:
              number: 3000

---
# Certificate for TLS (using cert-manager)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: servicepass-tls
  namespace: servicepass
spec:
  secretName: servicepass-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
  - app.servicepass.com
  - api.servicepass.com
